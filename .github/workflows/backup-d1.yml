name: Backup D1 to R2

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly, Sunday 3am UTC (before reconciliation notification)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create R2 bucket (idempotent)
        working-directory: apps/worker
        run: npx wrangler r2 bucket create declyne-backups 2>&1 || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 59b6cf53e5d4cef04586e1deb177093c

      - name: Export D1 database
        working-directory: apps/worker
        run: |
          BACKUP_FILE="declyne-$(date -u +%Y-%m-%dT%H-%M-%SZ).sql"
          echo "BACKUP_FILE=${BACKUP_FILE}" >> "$GITHUB_ENV"
          npx wrangler d1 export declyne --remote --output "/tmp/${BACKUP_FILE}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 59b6cf53e5d4cef04586e1deb177093c

      - name: Upload to R2
        working-directory: apps/worker
        run: npx wrangler r2 object put "declyne-backups/${{ env.BACKUP_FILE }}" --file "/tmp/${{ env.BACKUP_FILE }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 59b6cf53e5d4cef04586e1deb177093c

      - name: Cleanup
        if: always()
        run: rm -f "/tmp/${{ env.BACKUP_FILE }}"
