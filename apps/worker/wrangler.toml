name = "declyne-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "declyne"
database_id = "0893ada8-cbdb-4b3c-896c-c93c792023f1"

[triggers]
# Nightly at 08:00 UTC (roughly 3am-4am ET). Recomputes behaviour signals.
crons = ["0 8 * * *"]

# Secrets (set with `wrangler secret put`):
#   OPENAI_API_KEY
#   TWELVE_DATA_KEY
#   FMP_KEY
#   API_TOKEN         # shared token between client and worker (single-user app)
